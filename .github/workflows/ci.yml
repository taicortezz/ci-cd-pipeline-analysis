name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run lint
        run: python -m flake8 app tests

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          set +e
          python -m pytest tests --junitxml=test-results.xml
          test_exit_code=$?
          echo "exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          exit "$test_exit_code"

      - name: Generate test summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          from xml.etree import ElementTree

          result_path = Path("test-results.xml")
          summary = {
              "test_count": "0",
              "test_failures": "0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }

          if result_path.exists():
              root = ElementTree.parse(result_path).getroot()
              suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
              tests = sum(int(suite.attrib.get("tests", 0)) for suite in suites)
              failures = sum(int(suite.attrib.get("failures", 0)) for suite in suites)
              errors = sum(int(suite.attrib.get("errors", 0)) for suite in suites)
              summary["test_count"] = str(tests)
              summary["test_failures"] = str(failures + errors)

          Path("test-summary.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            test-summary.json

      - name: Fail if tests failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
